services:
  cli-assistant:
    build: .
    container_name: cli-assistant
    network_mode: "host"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      CA_LLM_PROVIDER: ${CA_LLM_PROVIDER:-openai-compatible}
      CA_LLM_MODEL: ${CA_LLM_MODEL:-local-model}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-http://127.0.0.1:1234/v1}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-local}
    volumes:
      - ./runtime-context:/app/runtime-context
      # Host logs are mounted read-only so commands like journalctl, tail, grep,
      # and find can inspect host logs without giving the container write access.
      - /var/log:/var/log:ro
      # Docker socket access lets the assistant inspect local containers with
      # `docker ps`, `docker logs`, and `docker inspect`. Treat this as highly
      # privileged: Docker's API is not meaningfully read-only even if the socket
      # bind mount is marked read-only.
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: uncomment on hosts that use volatile journald storage.
      # - /run/log/journal:/run/log/journal:ro
      # Example external notes mount:
      # - ~/Obsidian/Network:/app/runtime-context/notes
    stdin_open: true
    tty: true
